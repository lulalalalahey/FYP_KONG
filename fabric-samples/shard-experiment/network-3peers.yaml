name: Caliper Test Network 5 Peers
version: "2.0.0"
caliper:
  blockchain: 'fabric'

channels:
  - channelName: mychannel
    contracts:
      - id: ev-cc
    peers:
      peer0.org1.example.com:
        endorsingPeer: true
        chaincodeQuery: true
        eventSource: true
      peer1.org1.example.com:
        endorsingPeer: true
        chaincodeQuery: true
        eventSource: true
      peer2.org1.example.com:
        endorsingPeer: true
        chaincodeQuery: true
        eventSource: true
      peer3.org1.example.com:  # 增加了 peer3
        endorsingPeer: true
        chaincodeQuery: true
        eventSource: true
      peer4.org1.example.com:  # 增加了 peer4
        endorsingPeer: true
        chaincodeQuery: true
        eventSource: true
organizations:
  - mspid: Org1MSP
    identities:
      certificates:
        - name: 'User1'
          clientPrivateKey:
            path: "../test-network/organizations/peerOrganizations/org1.example.com/users/User1@org1.example.com/msp/keystore/priv_sk"
          clientSignedCert:
            path: "../test-network/organizations/peerOrganizations/org1.example.com/users/User1@org1.example.com/msp/signcerts/User1@org1.example.com-cert.pem"
    connectionProfile:
      path: '../test-network/organizations/peerOrganizations/org1.example.com/connection-org1.yaml'
      discover: false


